<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>VYVE Health</title>
<meta name="robots" content="noindex,nofollow"/>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0D2B2B;color:#fff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .card{text-align:center;max-width:420px;width:100%;}
  .logo{font-family:'Playfair Display',Georgia,serif;font-size:32px;font-weight:700;color:#4DAAAA;letter-spacing:-.01em;margin-bottom:6px;}
  .tagline{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:36px;}
  .spinner{width:36px;height:36px;border:3px solid rgba(77,170,170,.2);border-top-color:#4DAAAA;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 24px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:8px;}
  .sub{font-size:13px;color:rgba(255,255,255,.35);}
  .err{display:none;margin-top:24px;}
  .err p{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:20px;line-height:1.6;}
  .btn{display:inline-block;padding:12px 28px;background:#1B7878;color:#fff;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="card">
  <div class="logo">VYVE</div>
  <div class="tagline">Help yourself. Help others. Change the world.</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Getting your link ready&hellip;</div>
  <div class="sub" id="sub">You&rsquo;ll be redirected in a moment</div>
  <div class="err" id="err">
    <p>That link doesn&rsquo;t exist. Head to our site to sign up.</p>
    <a href="https://www.vyvehealth.co.uk" class="btn">Go to VYVE Health</a>
  </div>
</div>
<script>
(function(){
  var EF_URL = 'https://ixjfklpckgxrwjlfsaaz.supabase.co/functions/v1/partner-join-redirect';
  var WELCOME = 'https://www.vyvehealth.co.uk/welcome.html';

  var path = window.location.pathname;

  // /trial/[slug] — start a FREE trial attributed to the partner. The slug doubles
  // as the trial campaign code: welcome.html captures ?c=<slug>, onboarding stamps
  // members.signup_campaign_code=<slug>, apply_trial_campaign resolves the partner's
  // trial length, and the partner is credited at the £10 conversion. No Stripe here —
  // the trial is free and card-less.
  var trialMatch = path.match(/\/trial\/([^/?#]+)/);
  if (trialMatch) {
    var tslug = trialMatch[1];
    window.location.replace(WELCOME + '?c=' + encodeURIComponent(tslug));
    return;
  }

  // /join/[slug] and optional /join/[slug]/[tier] — pay NOW via Stripe Checkout.
  // tier is one of 20 | 15 | 10 (the member price point); anything else is ignored
  // and the partner's default (legacy) link behaviour applies.
  var joinMatch = path.match(/\/join\/([^/?#]+)(?:\/([^/?#]+))?/);
  if (!joinMatch) { showError(); return; }
  var slug = joinMatch[1];
  var tier = joinMatch[2];

  // Hit the server-side redirect EF — it mints a discounted Stripe Checkout Session
  // and 303s to it. window.location.replace follows the redirect seamlessly.
  var target = EF_URL + '?slug=' + encodeURIComponent(slug);
  if (tier === '20' || tier === '15' || tier === '10') {
    target += '&tier=' + tier;
  }
  window.location.replace(target);
})();

function showError(){
  document.getElementById('spinner').style.display='none';
  document.getElementById('msg').style.display='none';
  document.getElementById('sub').style.display='none';
  document.getElementById('err').style.display='block';
}
</script>
</body>
</html>
