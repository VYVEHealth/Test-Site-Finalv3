<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Join VYVE Health</title>
<meta name="robots" content="noindex,nofollow"/>
<meta property="og:title" content="Join VYVE Health"/>
<meta property="og:description" content="Proactive wellbeing. Help yourself. Help others. Change the world."/>
<meta property="og:image" content="https://www.vyvehealth.co.uk/og-image.png"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--teal:#1B7878;--teal-lt:#4DAAAA;--dark:#0D2B2B;--white:#fff;}
  html,body{height:100%;background:var(--dark);color:var(--white);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .card{text-align:center;max-width:420px;width:100%;}
  .logo{font-family:'Playfair Display',Georgia,serif;font-size:32px;font-weight:700;color:var(--teal-lt);letter-spacing:-.01em;margin-bottom:6px;}
  .tagline{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;margin-bottom:36px;}
  .spinner{width:36px;height:36px;border:3px solid rgba(77,170,170,.2);border-top-color:var(--teal-lt);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 24px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{font-size:15px;color:rgba(255,255,255,.7);margin-bottom:8px;}
  .sub{font-size:13px;color:rgba(255,255,255,.35);}
  .err{display:none;font-size:14px;color:#f87171;margin-top:16px;line-height:1.5;}
  .btn{display:inline-block;margin-top:20px;padding:12px 28px;background:var(--teal);color:#fff;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="card">
  <div class="logo">VYVE</div>
  <div class="tagline">Help yourself. Help others. Change the world.</div>
  <div class="spinner" id="spinner"></div>
  <div class="msg" id="msg">Getting your link ready&hellip;</div>
  <div class="sub" id="sub">You&rsquo;ll be redirected in a moment</div>
  <div class="err" id="err">
    <p id="err-msg">We couldn&rsquo;t find that referral link.</p>
    <a href="https://www.vyvehealth.co.uk" class="btn">Go to VYVE Health</a>
  </div>
</div>
<script>
(function(){
  var SUPA_URL  = 'https://ixjfklpckgxrwjlfsaaz.supabase.co';
  var SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4amZrbHBja2d4cndqbGZzYWF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjY0OTUsImV4cCI6MjA5MDY0MjQ5NX0.to0pwmP-F1g93hb-Fbbq4BZUPkJ4KAGEIFwDtn4whCg';
  var FALLBACK  = 'https://buy.stripe.com/00wfZicla1Em0NnaIB93y00';

  // Extract slug: /join/men-together -> men-together
  var parts = window.location.pathname.replace(/\/+$/, '').split('/');
  var slug  = parts[parts.length - 1];

  if (!slug || slug === 'join') {
    window.location.replace(FALLBACK);
    return;
  }

  fetch(
    SUPA_URL + '/rest/v1/partner_partners?slug=eq.' + encodeURIComponent(slug) +
    '&status=eq.live&select=name,payment_link_url,role_title&limit=1',
    { headers: { 'apikey': SUPA_ANON } }
  )
  .then(function(r){ return r.json(); })
  .then(function(rows){
    var p = rows && rows[0];
    if (!p || !p.payment_link_url) {
      showError("We couldn't find that referral link. Please check the URL or contact the person who shared it with you.");
      return;
    }
    document.getElementById('msg').textContent = 'Taking you to VYVE via ' + (p.role_title || p.name) + '…';
    document.getElementById('sub').textContent = 'Your exclusive discount is already applied';
    setTimeout(function(){ window.location.replace(p.payment_link_url); }, 900);
  })
  .catch(function(){ window.location.replace(FALLBACK); });

  function showError(msg){
    document.getElementById('spinner').style.display='none';
    document.getElementById('msg').style.display='none';
    document.getElementById('sub').style.display='none';
    document.getElementById('err-msg').textContent=msg;
    document.getElementById('err').style.display='block';
  }
})();
</script>
</body>
</html>
